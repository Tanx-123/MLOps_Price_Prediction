name: ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "requirements.txt"
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"   # every Sunday midnight UTC

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ── Stage 1: Test ────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Stage 2: Data Processing ─────────────────────────────────────
  data-processing:
    name: Data Processing
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       github.event_name == 'workflow_dispatch' ||
       github.event_name == 'schedule')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python -m src.data_pipeline

      - name: Upload processed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
  # ── Stage 3: Train Model ─────────────────────────────────────────
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: data-processing
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Train model
        run: python -m src.train_pipeline

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

  # ── Stage 4: Evaluate Model ──────────────────────────────────────
  evaluate:
    name: Evaluate Model
    runs-on: ubuntu-latest
    needs: train
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Evaluate model (quality gate)
        run: python -m src.evaluate

      - name: Upload evaluation metrics
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: artifacts/eval_metrics.json

  # ── Stage 5: Docker Build & Push ─────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: evaluate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Build Docker image
        run: docker build -t rent-predictor:${{ github.sha }} .

      - name: Tag latest
        run: docker tag rent-predictor:${{ github.sha }} rent-predictor:latest

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Push to ECR
        run: |
          docker tag rent-predictor:${{ github.sha }} ${{ secrets.ECR_REGISTRY }}/rent-predictor:${{ github.sha }}
          docker tag rent-predictor:latest ${{ secrets.ECR_REGISTRY }}/rent-predictor:latest
          docker push ${{ secrets.ECR_REGISTRY }}/rent-predictor:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/rent-predictor:latest