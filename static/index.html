<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Predictor | AI-Powered Rent Estimation</title>
    <meta name="description" content="Predict house rent instantly using machine learning. Get accurate rent estimates based on property features.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #111640;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f2ff;
            --text-secondary: #8b8fb0;
            --text-muted: #5a5e80;
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
            --accent-glow: rgba(99, 102, 241, 0.3);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effects */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-effects .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: float 20s infinite ease-in-out;
        }
        .bg-effects .orb-1 {
            width: 500px; height: 500px;
            background: rgba(99, 102, 241, 0.12);
            top: -10%; left: -5%;
        }
        .bg-effects .orb-2 {
            width: 400px; height: 400px;
            background: rgba(139, 92, 246, 0.08);
            bottom: -10%; right: -5%;
            animation-delay: -10s;
        }
        .bg-effects .orb-3 {
            width: 300px; height: 300px;
            background: rgba(168, 85, 247, 0.06);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(20px, 10px) scale(1.02); }
        }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }
        .header .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge .dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .header h1 {
            font-size: 44px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #f0f2ff 0%, #c4b5fd 50%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
            transition: border-color 0.3s;
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }
        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title svg {
            width: 16px;
            height: 16px;
            color: #818cf8;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            outline: none;
            transition: all 0.25s;
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        .form-group select option {
            background: #1a1f4a;
            color: var(--text-primary);
        }

        /* Full width locality */
        .form-group.full-width {
            grid-column: 1 / -1;
        }

        /* Submit */
        .submit-area {
            margin-top: 32px;
            display: flex;
            justify-content: center;
        }
        .btn-predict {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 40px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px var(--accent-glow);
            letter-spacing: 0.3px;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
        .btn-predict:active {
            transform: translateY(0);
        }
        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-predict svg {
            width: 18px;
            height: 18px;
        }

        /* Spinner */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result */
        .result-card {
            margin-top: 28px;
            display: none;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-card.show { display: block; }
        .result-card.error .result-inner {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .result-inner {
            background: var(--bg-card);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }
        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .result-amount {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #10b981, #34d399, #6ee7b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }
        .result-currency {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .result-error {
            color: var(--error);
            font-size: 14px;
        }

        /* Status bar */
        .status-bar {
            margin-top: 48px;
            display: flex;
            justify-content: center;
            gap: 32px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .status-item .indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
        }
        .status-item .indicator.online { background: var(--success); }
        .status-item .indicator.offline { background: var(--error); }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 { font-size: 32px; }
            .form-grid { grid-template-columns: 1fr; }
            .card { padding: 24px; }
            .result-amount { font-size: 36px; }
            .status-bar { flex-direction: column; align-items: center; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="badge">
                <span class="dot"></span>
                ML-Powered
            </div>
            <h1>Rent Predictor</h1>
            <p>Get instant, AI-powered rent estimates for any property. Powered by a RandomForest model trained on real market data.</p>
        </header>

        <!-- Form Card -->
        <div class="card">
            <div class="card-title">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Property Details
            </div>

            <form id="predictForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="bhk">BHK</label>
                        <select id="bhk" required>
                            <option value="1">1 BHK</option>
                            <option value="2" selected>2 BHK</option>
                            <option value="3">3 BHK</option>
                            <option value="4">4 BHK</option>
                            <option value="5">5 BHK</option>
                            <option value="6">6+ BHK</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="size">Size (sqft)</label>
                        <input type="number" id="size" placeholder="e.g. 800" min="100" max="10000" required>
                    </div>

                    <div class="form-group">
                        <label for="bathroom">Bathrooms</label>
                        <select id="bathroom" required>
                            <option value="1">1</option>
                            <option value="2" selected>2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5+</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="floorNum">Floor Number</label>
                        <input type="number" id="floorNum" placeholder="e.g. 2" min="-2" max="50" required>
                    </div>

                    <div class="form-group">
                        <label for="totalFloors">Total Floors</label>
                        <input type="number" id="totalFloors" placeholder="e.g. 5" min="1" max="50" required>
                    </div>

                    <div class="form-group">
                        <label for="areaType">Area Type</label>
                        <select id="areaType" required>
                            <option value="Super Area">Super Area</option>
                            <option value="Carpet Area">Carpet Area</option>
                            <option value="Built Area">Built Area</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="city">City</label>
                        <select id="city" required>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Chennai">Chennai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Hyderabad">Hyderabad</option>
                            <option value="Kolkata">Kolkata</option>
                            <option value="Mumbai">Mumbai</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="furnishing">Furnishing</label>
                        <select id="furnishing" required>
                            <option value="Furnished">Furnished</option>
                            <option value="Semi-Furnished">Semi-Furnished</option>
                            <option value="Unfurnished">Unfurnished</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="tenant">Tenant Preferred</label>
                        <select id="tenant" required>
                            <option value="Bachelors/Family">Bachelors/Family</option>
                            <option value="Bachelors">Bachelors</option>
                            <option value="Family">Family</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label for="locality">Area / Locality</label>
                        <input type="text" id="locality" placeholder="e.g. Whitefield, Koramangala, Bandra..." required>
                    </div>
                </div>

                <div class="submit-area">
                    <button type="submit" class="btn-predict" id="btnPredict">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <span id="btnText">Predict Rent</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                </div>
            </form>

            <!-- Result -->
            <div class="result-card" id="resultCard">
                <div class="result-inner">
                    <div class="result-label" id="resultLabel">Estimated Monthly Rent</div>
                    <div class="result-amount" id="resultAmount"></div>
                    <div class="result-currency" id="resultCurrency">per month</div>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div class="status-bar">
            <div class="status-item">
                <div class="indicator" id="apiStatus"></div>
                <span id="apiStatusText">Checking API...</span>
            </div>
            <div class="status-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                </svg>
                <span>RandomForest Model</span>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Check API health
        async function checkHealth() {
            const indicator = document.getElementById('apiStatus');
            const text = document.getElementById('apiStatusText');
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                if (data.model_loaded) {
                    indicator.className = 'indicator online';
                    text.textContent = 'Model Online';
                } else {
                    indicator.className = 'indicator offline';
                    text.textContent = 'Model Not Loaded';
                }
            } catch {
                indicator.className = 'indicator offline';
                text.textContent = 'API Offline';
            }
        }
        checkHealth();
        setInterval(checkHealth, 30000);

        // Form submission
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('btnPredict');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultCard = document.getElementById('resultCard');

            // Loading state
            btn.disabled = true;
            btnText.textContent = 'Predicting...';
            spinner.style.display = 'block';
            resultCard.classList.remove('show', 'error');

            const payload = {
                BHK: parseInt(document.getElementById('bhk').value),
                Size: parseInt(document.getElementById('size').value),
                Bathroom: parseInt(document.getElementById('bathroom').value),
                floor_num: parseInt(document.getElementById('floorNum').value),
                total_floors: parseInt(document.getElementById('totalFloors').value),
                Area_Type: document.getElementById('areaType').value,
                City: document.getElementById('city').value,
                Furnishing_Status: document.getElementById('furnishing').value,
                Tenant_Preferred: document.getElementById('tenant').value,
                Area_Locality: document.getElementById('locality').value,
            };

            try {
                const res = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Prediction failed');
                }

                const data = await res.json();
                const amount = data.predicted_rent;

                // Format as Indian currency
                const formatted = '₹' + amount.toLocaleString('en-IN', {
                    maximumFractionDigits: 0,
                });

                document.getElementById('resultLabel').textContent = 'Estimated Monthly Rent';
                document.getElementById('resultAmount').textContent = formatted;
                document.getElementById('resultAmount').style.background = 'linear-gradient(135deg, #10b981, #34d399, #6ee7b7)';
                document.getElementById('resultAmount').style.webkitBackgroundClip = 'text';
                document.getElementById('resultAmount').style.webkitTextFillColor = 'transparent';
                document.getElementById('resultCurrency').textContent = 'per month';
                resultCard.classList.remove('error');
                resultCard.classList.add('show');

            } catch (err) {
                document.getElementById('resultLabel').textContent = 'Error';
                document.getElementById('resultAmount').textContent = err.message;
                document.getElementById('resultAmount').style.background = 'none';
                document.getElementById('resultAmount').style.webkitTextFillColor = '#ef4444';
                document.getElementById('resultAmount').style.fontSize = '16px';
                document.getElementById('resultCurrency').textContent = '';
                resultCard.classList.add('show', 'error');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Predict Rent';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
